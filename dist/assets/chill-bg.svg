<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 320 180" shape-rendering="crispEdges">
  <!-- Chill-hop / lo-fi pixel backdrop: dusk city + warm room glow -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1430"/>
      <stop offset="45%" stop-color="#3d2a55"/>
      <stop offset="72%" stop-color="#c45c3e"/>
      <stop offset="100%" stop-color="#e8a05c"/>
    </linearGradient>
    <linearGradient id="room" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2018"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="320" height="180" fill="url(#sky)"/>

  <!-- Soft sun -->
  <rect x="210" y="58" width="36" height="36" fill="#f0c070" opacity="0.9"/>
  <rect x="218" y="66" width="20" height="20" fill="#ffe0a0"/>

  <!-- Distant hills -->
  <rect x="0" y="110" width="320" height="20" fill="#2a1838"/>
  <rect x="0" y="118" width="320" height="12" fill="#221430"/>

  <!-- Pixel city silhouette -->
  <g fill="#14101c">
    <rect x="0" y="95" width="18" height="40"/>
    <rect x="16" y="85" width="14" height="50"/>
    <rect x="28" y="100" width="22" height="35"/>
    <rect x="48" y="78" width="16" height="57"/>
    <rect x="62" y="92" width="20" height="43"/>
    <rect x="80" y="70" width="12" height="65"/>
    <rect x="90" y="88" width="24" height="47"/>
    <rect x="112" y="96" width="18" height="39"/>
    <rect x="128" y="82" width="14" height="53"/>
    <rect x="140" y="100" width="30" height="35"/>
    <rect x="168" y="90" width="16" height="45"/>
    <rect x="182" y="75" width="20" height="60"/>
    <rect x="200" y="98" width="22" height="37"/>
    <rect x="220" y="86" width="14" height="49"/>
    <rect x="232" y="94" width="26" height="41"/>
    <rect x="256" y="80" width="18" height="55"/>
    <rect x="272" y="100" width="20" height="35"/>
    <rect x="290" y="88" width="16" height="47"/>
    <rect x="304" y="96" width="16" height="39"/>
  </g>

  <!-- Window lights -->
  <g fill="#e8b86a" opacity="0.85">
    <rect x="20" y="100" width="3" height="3"/>
    <rect x="52" y="95" width="3" height="3"/>
    <rect x="54" y="105" width="3" height="3"/>
    <rect x="84" y="90" width="3" height="3"/>
    <rect x="96" y="100" width="3" height="3"/>
    <rect x="132" y="100" width="3" height="3"/>
    <rect x="188" y="95" width="3" height="3"/>
    <rect x="190" y="108" width="3" height="3"/>
    <rect x="260" y="100" width="3" height="3"/>
    <rect x="294" y="105" width="3" height="3"/>
  </g>
  <g fill="#6ec8c0" opacity="0.7">
    <rect x="34" y="110" width="3" height="3"/>
    <rect x="100" y="110" width="3" height="3"/>
    <rect x="224" y="105" width="3" height="3"/>
    <rect x="276" y="108" width="3" height="3"/>
  </g>

  <!-- Ground / sill -->
  <rect x="0" y="135" width="320" height="45" fill="url(#room)"/>
  <rect x="0" y="132" width="320" height="4" fill="#3d3228"/>

  <!-- Desk strip -->
  <rect x="40" y="150" width="200" height="8" fill="#4a3a2a"/>
  <rect x="40" y="158" width="200" height="3" fill="#2a2018"/>

  <!-- Plant pot -->
  <rect x="55" y="142" width="14" height="10" fill="#6b4030"/>
  <rect x="58" y="132" width="3" height="12" fill="#3d6b4a"/>
  <rect x="62" y="128" width="4" height="14" fill="#4a8a58"/>
  <rect x="66" y="134" width="3" height="10" fill="#3d6b4a"/>

  <!-- Mug -->
  <rect x="90" y="140" width="12" height="12" fill="#c47850"/>
  <rect x="102" y="143" width="4" height="6" fill="#c47850"/>
  <rect x="92" y="142" width="8" height="3" fill="#e8c4a0" opacity="0.5"/>

  <!-- Keyboard -->
  <rect x="120" y="144" width="48" height="10" fill="#2a2830"/>
  <rect x="122" y="146" width="4" height="3" fill="#5a5860"/>
  <rect x="128" y="146" width="4" height="3" fill="#5a5860"/>
  <rect x="134" y="146" width="4" height="3" fill="#5a5860"/>
  <rect x="140" y="146" width="4" height="3" fill="#8b5a2b"/>
  <rect x="146" y="146" width="4" height="3" fill="#5a5860"/>
  <rect x="152" y="146" width="4" height="3" fill="#5a5860"/>
  <rect x="158" y="146" width="6" height="3" fill="#5a5860"/>

  <!-- Monitor -->
  <rect x="175" y="118" width="50" height="32" fill="#1a1820"/>
  <rect x="178" y="121" width="44" height="24" fill="#2a4060"/>
  <rect x="180" y="123" width="20" height="3" fill="#6ec8c0" opacity="0.6"/>
  <rect x="180" y="128" width="30" height="2" fill="#e8a05c" opacity="0.5"/>
  <rect x="180" y="132" width="24" height="2" fill="#c45c3e" opacity="0.4"/>
  <rect x="195" y="150" width="10" height="4" fill="#3a3838"/>
  <rect x="188" y="154" width="24" height="3" fill="#2a2828"/>

  <!-- Vinyl / circle -->
  <rect x="240" y="140" width="18" height="18" fill="#1a1418"/>
  <rect x="244" y="144" width="10" height="10" fill="#3d2a40"/>
  <rect x="247" y="147" width="4" height="4" fill="#8b5a2b"/>

  <!-- Stars -->
  <g fill="#f0e0c8" opacity="0.55">
    <rect x="30" y="20" width="2" height="2"/>
    <rect x="60" y="35" width="2" height="2"/>
    <rect x="100" y="15" width="2" height="2"/>
    <rect x="140" y="40" width="2" height="2"/>
    <rect x="175" y="22" width="2" height="2"/>
    <rect x="250" y="30" width="2" height="2"/>
    <rect x="280" y="18" width="2" height="2"/>
    <rect x="300" y="45" width="2" height="2"/>
  </g>
</svg>
